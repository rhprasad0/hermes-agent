name: honcho-local

services:
  codex-bridge:
    build:
      context: ./codex_bridge
      dockerfile: Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    env_file:
      - ./.env
    environment:
      CODEX_BRIDGE_HERMES_AUTH_PATH: /run/hermes/auth.json
      CODEX_BRIDGE_HERMES_AUTH_LOCK_PATH: /run/hermes/auth.lock
      CODEX_BRIDGE_CODEX_AUTH_PATH: /run/codex/auth.json
    volumes:
      - ${HERMES_AUTH_PATH}:/run/hermes/auth.json
      - ${HERMES_AUTH_LOCK_PATH}:/run/hermes/auth.lock
      - ${CODEX_AUTH_PATH}:/run/codex/auth.json
    ports:
      - "127.0.0.1:4000:8001"
    restart: unless-stopped

  redis:
    image: redis:8.2
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  database:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "127.0.0.1:5434:5432"
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_DB: ${HONCHO_DB_NAME}
      POSTGRES_USER: ${HONCHO_DB_USER}
      POSTGRES_PASSWORD: ${HONCHO_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - honcho-pgdata:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${HONCHO_DB_USER} -d ${HONCHO_DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  honcho-api:
    build:
      context: ../../vendor/honcho
      dockerfile: Dockerfile
    entrypoint: ["sh", "docker/entrypoint.sh"]
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      codex-bridge:
        condition: service_started
    env_file:
      - ./.env
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://${HONCHO_DB_USER}:${HONCHO_DB_PASSWORD}@database:5432/${HONCHO_DB_NAME}
      CACHE_URL: "redis://redis:6379/0?suppress=true"
      CACHE_ENABLED: "true"
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  honcho-deriver:
    build:
      context: ../../vendor/honcho
      dockerfile: Dockerfile
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      codex-bridge:
        condition: service_started
      honcho-api:
        condition: service_started
    env_file:
      - ./.env
    environment:
      DB_CONNECTION_URI: postgresql+psycopg://${HONCHO_DB_USER}:${HONCHO_DB_PASSWORD}@database:5432/${HONCHO_DB_NAME}
      CACHE_URL: "redis://redis:6379/0?suppress=true"
      CACHE_ENABLED: "true"
    restart: unless-stopped

volumes:
  redis-data:
  honcho-pgdata:
